# fly.toml app configuration file generated for aerointel-backend on 2026-04-21T14:18:34-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aerointel-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.railway'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
